<div class="timeline-slider" role="group" aria-label="Timeline control">
  <span class="current-label">{{ currentLabel() }}</span>

  <div class="slider-track">
    <input
      type="range"
      [min]="0"
      [max]="maxIndex()"
      [value]="timeline.selectedHourIndex()"
      (input)="onInput($event)"
      aria-label="Select hour"
    />
    <div class="day-markers">
      @for (marker of dayMarkers(); track marker.label + marker.position) {
        <span class="day-marker" [style.left.%]="marker.position">
          {{ marker.label }}
        </span>
      }
    </div>
  </div>
</div>
