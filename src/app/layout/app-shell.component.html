<nav class="app-nav" aria-label="Main navigation">
  <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" aria-label="Explore map">
    <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true">
      <circle cx="10" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M10 2a6 6 0 00-6 6c0 4.5 6 10 6 10s6-5.5 6-10a6 6 0 00-6-6z" fill="none" stroke="currentColor" stroke-width="1.5"/>
    </svg>
    <span>Explore</span>
  </a>
  <a routerLink="/compare" routerLinkActive="active" aria-label="Compare cities">
    <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true">
      <rect x="1" y="4" width="7" height="12" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <rect x="12" y="4" width="7" height="12" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
    </svg>
    <span>Compare</span>
    @if (comparatorState.cityCount() > 0) {
      <span class="badge">{{ comparatorState.cityCount() }}</span>
    }
  </a>
  <a routerLink="/comfort" routerLinkActive="active" aria-label="Comfort score grid">
    <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true">
      <path d="M10 1l2.5 5 5.5.8-4 3.9.9 5.3L10 13.5 5.1 16l.9-5.3-4-3.9 5.5-.8z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
    <span>Comfort</span>
  </a>
</nav>

<router-outlet />
